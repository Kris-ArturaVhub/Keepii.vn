<!DOCTYPE html>
<html lang="vi">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  <title>Keepii.vn</title>
  <style>
    /* ✅ Hộp chứa tổng thể của toàn bộ app */
    #container {
      width: 100%;  
      height: 100vh; 
      margin: 0;
      padding: 0;
      overflow: hidden;
      position: relative;
      background: radial-gradient(circle, #101026 0%, #05050f 100%);
    }

    /* Lưới không gian 3D chìm */
    #container::before {
      content: "";
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background-image: 
        linear-gradient(rgba(6, 182, 212, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(6, 182, 212, 0.05) 1px, transparent 1px);
      background-size: 30px 30px;
      background-position: center;
      pointer-events: none;
    }
    
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #05050f;
      overflow: hidden;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }

    /* ⚡ CỬA SẬP TRANSTITION KHI ĐĂNG NHẬP / RELOAD */
    .gate-panel {
      position: fixed;
      width: 50%;
      height: 100vh;
      background-color: #05050f;
      z-index: 9500; /* Nằm trên cùng để che khuất màn hình khi chuyển cảnh */
      transition: transform 1.1s cubic-bezier(0.85, 0, 0.15, 1);
    }
    #gate-left { top: 0; left: 0; transform: translateX(-100%); }
    #gate-right { top: 0; right: 0; transform: translateX(100%); }
    
    body.gates-closed #gate-left { transform: translateX(0); }
    body.gates-closed #gate-right { transform: translateX(0); }

    /* NGÔI SAO DỊCH CHUYỂN XUYÊN TÂM */
    #transition-star {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) scale(0);
      width: 120px; height: 120px;
      background: #fff;
      clip-path: polygon(50% 0%, 65% 35%, 100% 50%, 65% 65%, 50% 100%, 35% 65%, 0% 50%, 35% 35%);
      z-index: 9600;
      opacity: 0;
      filter: drop-shadow(0 0 15px #fff) drop-shadow(0 0 30px #06b6d4);
      transition: transform 1.3s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.5s ease;
    }

    /* 1. KHE NỨT KHÔNG GIAN (Sửa bám đuổi mượt) */
    #space-crack {
      position: fixed;
      width: 220px;
      height: 220px;
      pointer-events: none;
      transform: translate(-50%, -50%) scale(0) rotate(0deg);
      opacity: 0;
      clip-path: polygon(0% 45%, 45% 45%, 100% 0%, 55% 55%, 100% 100%, 45% 55%, 0% 100%, 35% 50%);
      background: linear-gradient(135deg, #4f46e5, #d946ef, #06b6d4);
      box-shadow: inset 0 0 30px rgba(255, 255, 255, 0.8);
      z-index: 999;
      transition: transform 1.2s cubic-bezier(0.19, 1, 0.22, 1), opacity 1s ease;
    }

    #space-crack.active {
      transform: translate(-50%, -50%) scale(1) rotate(-15deg);
      opacity: 1;
    }

    /* 2. NGÔI SAO 4 ĐỈNH & HÀO QUANG */
    #core-container {
      position: fixed;
      width: 100px;
      height: 100px;
      pointer-events: none;
      transform: translate(-50%, -50%);
      z-index: 1000;
    }

    #core-star {
      position: absolute;
      left: 15px; top: 15px;
      width: 70px;
      height: 70px;
      transform: scale(0);
      opacity: 0;
      background: #ffffff;
      clip-path: polygon(50% 0%, 63% 37%, 100% 50%, 63% 63%, 50% 100%, 37% 63%, 0% 50%, 37% 37%);
      filter: drop-shadow(0 0 12px #fff) drop-shadow(0 0 25px #06b6d4) drop-shadow(0 0 45px #d946ef);
      transition: transform 1.2s cubic-bezier(0.1, 0.8, 0.2, 1), opacity 0.8s ease;
    }

    #core-star.active {
      transform: scale(1);
      opacity: 1;
      animation: starSpinPulse 2s infinite alternate ease-in-out;
    }

    #star-glow-ring {
      position: absolute;
      left: 0; top: 0;
      width: 100px;
      height: 100px;
      border: 2px solid rgba(6, 182, 212, 0.5);
      border-radius: 50%;
      transform: scale(0);
      opacity: 0;
    }
    #core-star.active ~ #star-glow-ring {
      animation: shockwave 1.5s infinite linear;
    }

    /* 3. LÀN SÓNG XUNG KÍCH KHI THẢ NHANH */
    .tap-shockwave {
      position: fixed;
      border: 4px solid #fff;
      border-radius: 50%;
      pointer-events: none;
      z-index: 1001;
      transform: translate(-50%, -50%) scale(0);
      animation: instantShockwave 0.6s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
    }
    
    @keyframes starSpinPulse {
      0% { transform: scale(0.9) rotate(0deg); filter: drop-shadow(0 0 10px #fff) drop-shadow(0 0 20px #06b6d4); }
      100% { transform: scale(1.15) rotate(30deg); filter: drop-shadow(0 0 20px #fff) drop-shadow(0 0 40px #d946ef); }
    }

    @keyframes shockwave {
      0% { transform: scale(0.3); opacity: 1; box-shadow: 0 0 10px rgba(217, 70, 239, 0.6); }
      100% { transform: scale(1.4); opacity: 0; box-shadow: 0 0 30px rgba(6, 182, 212, 0); }
    }

    @keyframes instantShockwave {
      0% { transform: translate(-50%, -50%) scale(0.1); opacity: 1; border-color: #fff; box-shadow: 0 0 20px #06b6d4; }
      50% { border-color: #d946ef; }
      100% { transform: translate(-50%, -50%) scale(2.5); opacity: 0; border-color: rgba(6, 182, 212, 0); box-shadow: 0 0 50px rgba(217, 70, 239, 0); }
    }

    /* Nút công tắc cố định góc phải trên - Không dịch chuyển vị trí */
    .theme-switch-wrapper {
      position: fixed !important;
      top: 15px !important;
      right: 15px !important;
      display: flex !important;
      align-items: center !important;
      z-index: 1002 !important; 
      gap: 10px;
    }

    .theme-switch input { display: none; }
    .theme-switch { display: inline-block; height: 26px; position: relative; width: 50px; }

    .slider {
      background-color: #ccc; bottom: 0; cursor: pointer; left: 0; position: absolute; right: 0; top: 0;
      transition: .4s;
    }
    .slider:before {
      background-color: #fff; bottom: 3px; content: ""; height: 20px; left: 4px;
      position: absolute; transition: .4s; width: 20px;
    }

    input:checked + .slider { background-color: #06b6d4; }
    input:checked + .slider:before { transform: translateX(22px); }
    .slider.round { border-radius: 34px; }
    .slider.round:before { border-radius: 50%; }

    /* Lớp khóa tạm thời nút bấm trong 2s */
    .switch-locked {
      pointer-events: none !important;
      opacity: 0.6;
    }

    #theme-overlay {
      position: fixed;
      left: 0;
      width: 100%;
      height: 135vh; 
      pointer-events: none; 
      z-index: 1; 
      opacity: 0;
      transform: translateY(-135vh);
      background: linear-gradient(to bottom, #ffffff 0%, #ffffff 75%, rgba(255, 255, 255, 0.7) 85%, rgba(255, 255, 255, 0.3) 92%, transparent 100%);
      transition: transform 0.95s cubic-bezier(0.85, 0, 0.15, 1), opacity 0.5s ease;
    }

    body.light-mode #theme-overlay {
      transform: translateY(-5vh); 
      opacity: 1;
      background: linear-gradient(to bottom, #ffffff 0%, #ffffff 75%, rgba(255, 255, 255, 0.7) 85%, rgba(255, 255, 255, 0.3) 92%, transparent 100%);
    }

    body.turning-dark #theme-overlay {
      transform: translateY(135vh);
      opacity: 0;
      background: linear-gradient(to top, #ffffff 0%, #ffffff 75%, rgba(255, 255, 255, 0.7) 85%, rgba(255, 255, 255, 0.3) 92%, transparent 100%);
    }

    h1, .card, .copyright, .rbs {
      position: relative;
      z-index: 2; 
    }

    body.light-mode h1 { color: #101026 !important; }
    body.light-mode .theme-switch-wrapper span { color: #101026 !important; }
    body.light-mode .copyright { color: rgba(0, 0, 0, 0.5) !important; }
    body.light-mode #container::before {
      background-image: 
        linear-gradient(rgba(0, 0, 0, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 0, 0, 0.04) 1px, transparent 1px) !important;
    }

    .cosmic-particle {
      position: fixed;
      pointer-events: none;
      border-radius: 50%;
      z-index: 998;
    }

    .rbs {
      background: linear-gradient(90deg, #ff0055, #ff9900, #33ff00, #00ffff, #ff00ff, #ff0055);
      background-size: 400%; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      font-weight: 900; font-size: 42px; filter: drop-shadow(0 0 10px rgba(0,255,255,0.3));
      animation: rainbow-smooth 6s linear infinite;
    }

    @keyframes rainbow-smooth{ 0%{ background-position: 0% 50%; } 100%{ background-position: 100% 50%; } }

    .card {
      position: relative; transform-origin: top center;
      transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275), background-color 0.4s ease, box-shadow 0.4s ease;
      cursor: pointer; display: flex !important; flex-direction: column !important;
      align-items: center !important; justify-content: center !important; 
      margin: 20px auto !important; padding: 0 !important; box-sizing: border-box !important;
      -webkit-tap-highlight-color: transparent; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }

    .card.active { transform: scale(1.05); background-color: #2a2a35 !important; box-shadow: 0 10px 25px rgba(6, 182, 212, 0.3); }
    .card-text { display: block; text-align: center; width: 100%; padding: 10px 0; }
    .desc { max-height: 0; overflow: hidden; opacity: 0; transition: max-height 0.6s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.3s ease; width: 100%; text-align: center; margin: 0; padding: 0 10px; box-sizing: border-box; font-size: 15px; }
    .card.active .desc { max-height: 250px; opacity: 1; padding-bottom: 15px; }

    .copyright { position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%); font-family: sans-serif; font-size: 12px; letter-spacing: 1px; }
    h1 { margin: 0; padding: 20px 10px 10px 10px; box-sizing: border-box; font-family: sans-serif; }
    .input-box { margin: 6px 0; padding: 6px 12px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.2); color: #fff; background-color: rgba(0,0,0,0.4); outline: none; transition: border-color 0.3s; }
    .input-box:focus { border-color: #06b6d4; }
    
    button.input-box {
      cursor: pointer; background: linear-gradient(135deg, #06b6d4, #4f46e5); color: white;
      font-weight: bold; border: none; padding: 8px 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); transition: transform 0.2s;
    }
    button.input-box:active { transform: scale(0.95); }
  </style>
</head>
<body>
  <div id="gate-left" class="gate-panel"></div>
  <div id="gate-right" class="gate-panel"></div>
  <div id="transition-star"></div>
  <div id="theme-overlay"></div>
  
  <div id="container">
    <div id="space-crack"></div>
    <div id="core-container">
        <div id="core-star"></div>
        <div id="star-glow-ring"></div>
    </div>
    
    <div class="theme-switch-wrapper" id="switch-wrapper">
      <span style="color: rgba(255,255,255,0.6); font-size: 14px; font-family: sans-serif;">Chế độ tối</span>
      <label class="theme-switch" for="checkbox">
        <input type="checkbox" id="checkbox" checked />
        <div class="slider round"></div>
      </label>
    </div>
    
    <div id="main-content-ui">
      <h1 style="color:white; text-align:center;">
        Welcome to<br>
        <div class="rbs" style="width: 280px; margin:10px auto;">Keepii.vn</div>
        <br>
        <div style="text-align:center;">
          <div style="width:80%; height:2px; background: linear-gradient(90deg, transparent, #06b6d4, transparent); margin: 0 auto;"></div>
        </div>
        <br>
        
        <div onclick="toggle(this)" style="background-color: #1b4332; border-radius:8px; width: 80%; min-height:45px; color:white; font-weight:bold; font-size: 16px;" class="card">
          <span class="card-text">Sign in</span>
          <div class="desc" onclick="event.stopPropagation()">
            nickname: <input type="text" id="siNick" placeholder="Nickname" class="input-box"><br>
            password: <input type="password" id="siPass" placeholder="Password" class="input-box"><br>
            <br><button onclick="signin()" class="input-box">confirm✅</button>
          </div>
        </div>
        
        <div style="text-align:center; color:rgba(255,255,255,0.4); font-size: 14px; margin: 15px 0; font-weight: normal;">OR</div>
        
        <div class="card" onclick="toggle(this)" style="background-color: #1a3a5f; border-radius:8px; width: 80%; min-height:45px; color:white; font-weight:bold; font-size: 16px;">
          <span class="card-text">sign up</span>
          <div class="desc" onclick="event.stopPropagation()">
            <span>enter a nickname:</span><br>
            <input class="input-box" id="suNick" placeholder="Nickname" type="text"><br>
            <span>enter a password:</span><br>
            <input class="input-box" id="suPass" placeholder="Password" type="password"><br>
            <span>confirm password:</span><br>
            <input class="input-box" id="suRe" placeholder="Confirm password" type="password"><br>
            <br><button class="input-box" onclick="signup()">confirm✅</button><br>
          </div>
        </div>
      </h1>
    </div>
    
    <p class="copyright" style="color:rgba(255,255,255,0.3)">VERSION 1.0</p>
  </div>

  <script>
    // --- ĐỌC SỚM VÀ ĐỒNG BỘ TRẠNG THÁI GIAO DIỆN NGAY KHI TẢI TRANG ---
    const toggleSwitch = document.querySelector('.theme-switch input[type="checkbox"]');
    const switchText = document.querySelector('.theme-switch-wrapper span');
    const switchWrapper = document.getElementById('switch-wrapper');
    
    const savedTheme = localStorage.getItem('site_theme') || 'dark';
    if(savedTheme === 'light') {
        document.body.classList.add('light-mode');
        toggleSwitch.checked = false;
        switchText.textContent = "Chế độ sáng";
    } else {
        document.body.classList.remove('light-mode');
        toggleSwitch.checked = true;
        switchText.textContent = "Chế độ tối";
    }

    // --- XỬ LÝ CÔNG TẮC ĐỔI NỀN + KHÓA COOLDOWN 2 GIÂY CHỐNG BẤM LIÊN TỤC ---
    toggleSwitch.addEventListener('change', function(e) {
        switchWrapper.classList.add('switch-locked'); // Khóa nút bấm ngay lập tức

        if (e.target.checked) {
            document.body.classList.remove('light-mode');
            document.body.classList.add('turning-dark'); 
            switchText.textContent = "Chế độ tối";
            localStorage.setItem('site_theme', 'dark');
            setTimeout(() => { 
                document.body.classList.remove('turning-dark'); 
            }, 950);
        } else {
            document.body.classList.remove('turning-dark');
            document.body.classList.add('light-mode'); 
            switchText.textContent = "Chế độ sáng";
            localStorage.setItem('site_theme', 'light');
        }

        // Mở khóa sau đúng 2 giây
        setTimeout(() => {
            switchWrapper.classList.remove('switch-locked');
        }, 2000);
    });

    function toggle(card){
      const active = card.classList.contains("active");
      document.querySelectorAll(".card").forEach(c => { c.classList.remove("active"); });
      if(!active) card.classList.add("active");
    }

    document.querySelectorAll(".input-box").forEach(input => {
      input.addEventListener("pointerdown", function(e){ e.stopPropagation(); });
      input.addEventListener("click", function(e){ e.stopPropagation(); });
    });

    document.addEventListener("click", function(e){
      if(!e.target.closest(".card")){
        document.querySelectorAll(".card").forEach(c => { c.classList.remove("active"); });
      }
    });

    function loadAccounts(){ return JSON.parse(localStorage.getItem("accounts")) || []; }
    function saveAccounts(a){ localStorage.setItem("accounts", JSON.stringify(a)); }
    
    function signup(){
      let nick = suNick.value.trim(); let pass = suPass.value; let re = suRe.value;
      if(!nick || !pass || !re){ alert("Không được để trống"); return; }
      if(pass.length < 8){ alert("Mật khẩu ít nhất 8 ký tự"); return; }
      if(pass !== re){ alert("Mật khẩu không khớp"); return; }
      let accounts = loadAccounts();
      if(accounts.find(a => a.nickname === nick)){ alert("Nickname đã tồn tại"); return; }
      accounts.push({nickname: nick, password: pass}); saveAccounts(accounts);
      alert("Đăng ký thành công 🎉"); suNick.value = ""; suPass.value = ""; suRe.value = "";
    }

    function signin(){
      let nick = siNick.value.trim(); let pass = siPass.value; let accounts = loadAccounts();
      let acc = accounts.find(a => a.nickname === nick && a.password === pass);
      if(acc) {
          executeTransitionGate(nick); // Gọi cơ chế chuyển tiếp mượt mà khi đăng nhập đúng
      } else {
          alert("Sai nickname hoặc mật khẩu ❌");
      }
      siNick.value = ""; siPass.value = "";
    }

    // --- HÀM CHUYỂN CẢNH CỬA SẬP VŨ TRỤ THAY THẾ ALERT ---
    function executeTransitionGate(username) {
      const d = new Date(); d.setTime(d.getTime() + (24*60*60*1000));
      document.cookie = `user_session=${username}; expires=${d.toUTCString()}; path=/`;
      
      const transStar = document.getElementById('transition-star');
      transStar.style.opacity = '1'; transStar.style.transform = 'translate(-50%, -50%) scale(1) rotate(360deg)';
      
      const isLight = document.body.classList.contains('light-mode');
      document.querySelectorAll('.gate-panel').forEach(gate => {
         gate.style.backgroundColor = isLight ? '#ffffff' : '#05050f';
         gate.style.transition = 'transform 1.1s cubic-bezier(0.85, 0, 0.15, 1)';
      });
      setTimeout(() => { document.body.classList.add('gates-closed'); }, 400);

      setTimeout(() => {
        document.getElementById('main-content-ui').style.display = 'none';
        fetch('user.html').then(res => res.text()).then(htmlData => {
            const userView = document.createElement('div'); userView.id = 'user-app-viewport';
            userView.innerHTML = htmlData; document.getElementById('container').appendChild(userView);
            
            const scripts = userView.querySelectorAll('script');
            scripts.forEach(oldScript => {
                const newScript = document.createElement('script');
                newScript.textContent = oldScript.textContent;
                document.body.appendChild(newScript);
            });

            transStar.style.transform = 'translate(-50%, -50%) scale(0) rotate(720deg)';
            setTimeout(() => { document.body.classList.remove('gates-closed'); transStar.style.opacity = '0'; }, 600);
        });
      }, 1500);
    }

    // --- KIỂM TRA COOKIE ĐỂ GIỮ PHIÊN KHI VÀO LẠI APP HOẶC RELOAD ---
    window.addEventListener('DOMContentLoaded', () => {
        const getCookie = (name) => {
            const match = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
            return match ? decodeURIComponent(match[2]) : null;
        };
        const savedUser = getCookie('user_session');
        if (savedUser) {
            document.body.classList.add('gates-closed');
            const isLight = document.body.classList.contains('light-mode');
            document.querySelectorAll('.gate-panel').forEach(gate => {
                gate.style.backgroundColor = isLight ? '#ffffff' : '#05050f';
                gate.style.transition = 'none';
            });
            document.getElementById('main-content-ui').style.display = 'none';
            
            fetch('user.html').then(res => res.text()).then(htmlData => {
                const userView = document.createElement('div'); userView.id = 'user-app-viewport';
                userView.innerHTML = htmlData; document.getElementById('container').appendChild(userView);
                
                const scripts = userView.querySelectorAll('script');
                scripts.forEach(oldScript => {
                    const newScript = document.createElement('script');
                    newScript.textContent = oldScript.textContent;
                    document.body.appendChild(newScript);
                });

                setTimeout(() => {
                    document.querySelectorAll('.gate-panel').forEach(gate => { gate.style.transition = 'transform 1.1s cubic-bezier(0.85, 0, 0.15, 1)'; });
                    document.body.classList.remove('gates-closed');
                }, 500);
            });
        }
    });

    // --- HỆ THỐNG HIỆU ỨNG KHÔNG GIAN (ĐÃ SỬA LỖI DI CHUYỂN KHI GIỮ) ---
    const crack = document.getElementById('space-crack');
    const container = document.getElementById('core-container');
    const star = document.getElementById('core-star');
    
    let isTouching = false; let isLongPress = false; let pressTimer = null;   
    let currentX = 0, currentY = 0;

    function createParticles(x, y, count = 8, speedMultiplier = 1) {
        for (let i = 0; i < count; i++) {
            const p = document.createElement('div');
            p.className = 'cosmic-particle';
            const size = Math.random() * 5 + 2;
            p.style.width = `${size}px`; p.style.height = `${size}px`;
            const isLightMode = document.body.classList.contains('light-mode');
            const colors = isLightMode ? ['#4f46e5', '#06b6d4', '#101026'] : ['#fff', '#f472b6', '#38bdf8', '#c084fc'];
            p.style.background = colors[Math.floor(Math.random() * colors.length)];
            p.style.left = `${x}px`; p.style.top = `${y}px`;
            p.style.opacity = '1'; p.style.transform = 'translate(-50%, -50%) scale(1)';
            document.body.appendChild(p);

            const angle = Math.random() * Math.PI * 2;
            const distance = (Math.random() * 80 + 40) * speedMultiplier;
            const tx = x + Math.cos(angle) * distance; const ty = y + Math.sin(angle) * distance;
            const duration = Math.random() * 800 + 700;

            p.style.transition = `all ${duration}ms cubic-bezier(0.1, 0.8, 0.2, 1)`;
            requestAnimationFrame(() => {
                p.style.left = `${tx}px`; p.style.top = `${ty}px`;
                p.style.opacity = '0'; p.style.transform = 'translate(-50%, -50%) scale(0)';
            });
            setTimeout(() => p.remove(), duration);
        }
    }

    function createInstantShockwave(x, y) {
        const wave = document.createElement('div'); wave.className = 'tap-shockwave';
        wave.style.left = `${x}px`; wave.style.top = `${y}px`;
        document.body.appendChild(wave); setTimeout(() => wave.remove(), 600);
    }

    window.addEventListener('pointerdown', (e) => {
        if (e.target.tagName === 'BUTTON' || e.target.tagName === 'INPUT' || e.target.closest('.desc') || e.target.closest('#user-app-viewport')) return; 

        isTouching = true; isLongPress = false; 
        currentX = e.clientX; currentY = e.clientY;
        clearTimeout(pressTimer);

        pressTimer = setTimeout(() => {
            if (isTouching) {
                isLongPress = true; 
                crack.style.left = `${currentX}px`; crack.style.top = `${currentY}px`;
                container.style.left = `${currentX}px`; container.style.top = `${currentY}px`;
                crack.classList.add('active'); star.classList.add('active');
                createParticles(currentX, currentY, 20, 1.2);
            }
        }, 350); 
    });

    window.addEventListener('pointermove', (e) => {
        if (!isTouching) return;
        currentX = e.clientX; currentY = e.clientY;

        // Cập nhật vị trí liên tục theo thời gian thực khi kéo ngón tay/chuột
        crack.style.left = `${currentX}px`; crack.style.top = `${currentY}px`;
        container.style.left = `${currentX}px`; container.style.top = `${currentY}px`;

        if (isLongPress && Math.random() < 0.4) { 
            createParticles(currentX, currentY, 3, 0.6);
        }
    });

    function endEffect() {
        if (!isTouching) return;
        clearTimeout(pressTimer);

        if (isLongPress) {
            createParticles(currentX, currentY, 15, 1.5);
            setTimeout(() => { crack.classList.remove('active'); star.classList.remove('active'); }, 300);
        } else {
            createInstantShockwave(currentX, currentY); createParticles(currentX, currentY, 12, 1.8); 
        }
        isTouching = false;
    }

    window.addEventListener('pointerup', endEffect);
    window.addEventListener('pointerleave', endEffect);
    window.addEventListener('pointercancel', endEffect);
  </script>
</body>
</html>
