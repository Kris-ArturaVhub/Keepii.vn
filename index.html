<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mô Phỏng Query Parameter VIP</title>
    <style>
        body {
            margin: 0; padding: 20px;
            background-color: #0b0f19; color: #fff;
            font-family: 'Segoe UI', sans-serif;
            display: flex; flex-direction: column; align-items: center;
        }
        .container {
            background: #151d30; padding: 30px;
            border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.3);
            text-align: center; width: 320px;
        }
        h2 { color: #06b6d4; margin-top: 0; }
        .btn {
            display: block; width: 100%; padding: 12px; margin: 10px 0;
            background: #1e293b; color: #fff; border: 2px solid #334155;
            border-radius: 8px; cursor: pointer; font-weight: bold;
            transition: all 0.2s; text-decoration: none; box-sizing: border-box;
        }
        .btn:hover { background: #06b6d4; border-color: #06b6d4; }
        .user-id {
            color: #d946ef; font-size: 24px; font-weight: bold;
            margin: 20px 0; word-break: break-all;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>HỆ THỐNG TÀI KHOẢN</h2>
        
        <button class="btn" onclick="changeUser('tjjtdht')">Chọn Acc: tjjtdht</button>
        <button class="btn" onclick="changeUser('vip_pro_999')">Chọn Acc: vip_pro_999</button>
        <button class="btn" onclick="changeUser('gaming_snake')">Chọn Acc: gaming_snake</button>
        
        <hr style="border-color: #334155; margin: 20px 0;">

        <div>Trạng thái hiện tại:</div>
        <div id="display-user" class="user-id">Chưa chọn acc</div>
    </div>

    <script>
        // 1. HÀM GỬI DỮ LIỆU LÊN URL (Khi nhấn nút)
        function changeUser(id) {
            // Tạo một đối tượng URL dựa trên trang hiện tại
            let currentUrl = new URL(window.location.href);
            
            // Đặt tham số 'account' thành ID được chọn (Nó sẽ tự thêm ?account=id)
            currentUrl.searchParams.set('account', id);
            
            // Đẩy URL mới lên thanh địa chỉ của trình duyệt mà KHÔNG LÀM LOAD LẠI TRANG (Rất mượt)
            window.history.pushState({}, '', currentUrl);
            
            // Gọi hàm đọc lại để cập nhật giao diện
            checkUrlParameter();
        }

        // 2. HÀM ĐỌC DỮ LIỆU TỪ URL XUỐNG (Khi tải trang hoặc khi URL thay đổi)
        function checkUrlParameter() {
            // Lấy chuỗi tìm kiếm sau dấu ?
            const urlParams = new URLSearchParams(window.location.search);
            
            // Đọc giá trị của tham số tên là 'account'
            const accountId = urlParams.get('account');
            
            const displayEl = document.getElementById('display-user');
            
            if (accountId) {
                // Nếu tìm thấy chữ sau dấu =, hiển thị nó ra màn hình
                displayEl.innerText = accountId;
                displayEl.style.color = "#d946ef";
            } else {
                displayEl.innerText = "Chưa chọn acc";
                displayEl.style.color = "#a4b0be";
            }
        }

        // Chạy hàm kiểm tra ngay khi vừa mở trang web lên
        window.onload = checkUrlParameter;
        
        // Lắng nghe sự kiện nếu người chơi bấm nút Back/Forward của trình duyệt
        window.onpopstate = checkUrlParameter;
    </script>
</body>
</html>
