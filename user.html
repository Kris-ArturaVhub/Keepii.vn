<style>
  /* ── 1. KHÔNG GIAN APPS CHÍNH CỦA USER ── */
  #user-dashboard {
    position: absolute;
    top: 60px; 
    left: 0;
    width: 100%;
    /* ✅ ĐÃ SỬA: Khóa cứng chiều cao vùng dashboard để tránh box bị lún xuống dưới */
    height: calc(100vh - 60px);
    box-sizing: border-box;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    font-family: sans-serif;
    overflow: hidden;
  }

  /* Khu vực gõ văn bản vô hạn */
  .infinite-text-pad {
    width: 100%;
    min-height: 80px;
    max-height: 150px;
    background: rgba(255, 255, 255, 0.07);
    border: 1px solid rgba(255, 255, 255, 0.15);
    border-radius: 12px;
    color: #fff;
    padding: 12px;
    box-sizing: border-box;
    outline: none;
    font-size: 16px;
    overflow-y: auto;
    white-space: pre-wrap;
    transition: background 0.3s, border-color 0.3s;
  }
  body.light-mode .infinite-text-pad {
    background: rgba(0, 0, 0, 0.05);
    border: 1px solid rgba(0, 0, 0, 0.15);
    color: #101026;
  }
  .infinite-text-pad:focus {
    border-color: #06b6d4;
    background: rgba(255, 255, 255, 0.12);
  }

  /* ── 2. GRID XẾP GHÉP Ô (1/4 MÀN HÌNH) ── */
  #notes-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr); 
    gap: 15px;
    flex: 1;
    overflow-y: auto;
    /* ✅ ĐÃ SỬA: Đảm bảo phần đệm vừa vặn với thanh controls đáy, tránh lún lút */
    padding-bottom: 80px; 
  }

  .note-card {
    background: linear-gradient(135deg, rgba(6, 182, 212, 0.15), rgba(79, 70, 229, 0.15));
    border: 1px solid rgba(6, 182, 212, 0.3);
    border-radius: 12px;
    height: 130px;
    padding: 12px;
    box-sizing: border-box;
    color: #fff;
    cursor: pointer;
    overflow: hidden;
    position: relative;
    transition: transform 0.4s cubic-bezier(0.25, 1.5, 0.5, 1);
  }
  body.light-mode .note-card {
    background: linear-gradient(135deg, rgba(6, 182, 212, 0.1), rgba(79, 70, 229, 0.1));
    border: 1px solid rgba(6, 182, 212, 0.4);
    color: #101026;
  }
  .note-card:active { transform: scale(0.94); }
  
  .note-card-title {
    font-weight: bold;
    font-size: 14px;
    margin-bottom: 6px;
    color: #06b6d4;
    text-overflow: ellipsis;
    white-space: nowrap;
    overflow: hidden;
  }
  .note-card-body {
    font-size: 13px;
    opacity: 0.8;
    display: -webkit-box;
    -webkit-line-clamp: 4;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  /* ── 3. KHU VỰC TRÌNH CHỈNH SỬA TOÀN MÀN HÌNH CHUẨN ── */
  .fullscreen-note-container {
    position: fixed;
    top: 0; left: 0; width: 100vw; height: 100vh;
    z-index: 6000; 
    background: #090915;
    box-sizing: border-box;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 15px;
  }
  body.light-mode .fullscreen-note-container { background: #ffffff; }

  /* Header chứa tiêu đề chỉnh sửa bên trái và nút thoát bên phải */
  .fullscreen-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    height: 40px;
  }

  .fullscreen-title {
    color: #06b6d4;
    font-weight: bold;
    font-family: sans-serif;
    font-size: 16px;
  }

  /* NÚT THOÁT GÓC TRÊN BÊN PHẢI (DIV + CUBIC BEZIER) */
  .close-edit-btn {
    background: #ef4444;
    color: white;
    padding: 6px 16px;
    border-radius: 20px;
    font-weight: bold;
    font-size: 13px;
    cursor: pointer;
    user-select: none;
    box-shadow: 0 3px 10px rgba(239, 68, 68, 0.3);
    transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }
  .close-edit-btn:active { transform: scale(0.88) !important; }

  .fullscreen-editor {
    width: 100%;
    flex: 1; 
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 15px;
    box-sizing: border-box;
    outline: none;
    color: #fff;
    font-size: 16px;
    resize: none;
    font-family: sans-serif;
  }
  body.light-mode .fullscreen-editor {
    background: rgba(0,0,0,0.02);
    border: 1px solid rgba(0,0,0,0.1);
    color: #101026;
  }

  /* ── 4. THIẾT KẾ CÁC NÚT ĐIỀU HƯỚNG ĐÁY MÀN HÌNH ── */
  .bottom-controls-bar {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1005;
  }

  #add-note-btn {
    width: 55px;
    height: 55px;
    border-radius: 50%;
    background: linear-gradient(135deg, #06b6d4, #4f46e5);
    color: white;
    font-size: 30px;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(6, 182, 212, 0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    user-select: none;
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  #add-note-btn:active { transform: scale(0.85); }

  /* Nút Tùy Chọn Trong Popup */
  .type-option-btn {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.05);
    color: #fff;
    font-weight: bold;
    cursor: pointer;
    text-align: left;
    box-sizing: border-box;
    user-select: none;
    transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), background 0.2s;
  }
  body.light-mode .type-option-btn { background: rgba(0,0,0,0.03); border: 1px solid rgba(0,0,0,0.1); color: #101026; }
  .type-option-btn:active { transform: scale(0.96); background: rgba(6, 182, 212, 0.2); }

  /* ── 5. POPUP LỰA CHỌN PHÂN LOẠI ── */
  #type-popup-mask {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.6);
    z-index: 4500;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s ease;
  }
  #type-popup-mask.open { opacity: 1; pointer-events: auto; }
  
  .type-popup-box {
    background: #151525;
    border: 2px solid #06b6d4;
    border-radius: 16px;
    padding: 25px;
    width: 85%;
    max-width: 320px;
    text-align: center;
    transform: scale(0.6);
    transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  body.light-mode .type-popup-box { background: #ffffff; }
  #type-popup-mask.open .type-popup-box { transform: scale(1); }
  
  .popup-title { color: #fff; font-weight: bold; margin-bottom: 15px; font-size: 16px; }
  body.light-mode .popup-title { color: #101026; }

  /* ── 6. CƠ CHẾ AVATAR + BOX NGĂN KÉO TRƯỢT (ANM SLIDE) ── */
  #user-avatar-container {
    position: fixed;
    top: 15px;
    right: 140px; /* Tránh đè lên công tắc theme-switch */
    z-index: 5000;
  }

  .avatar-circle-btn {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    background: linear-gradient(135deg, #06b6d4, #4f46e5);
    color: white;
    font-weight: bold;
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    user-select: none;
    border: 2px solid rgba(255,255,255,0.2);
    box-shadow: 0 0 10px rgba(6,182,212,0.4);
    transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }
  .avatar-circle-btn:active { transform: scale(0.9); }

  /* Box thông tin dạng ngăn kéo trượt (Slide Panel) */
  .info-drawer-panel {
    position: absolute;
    top: 38px;
    right: 0;
    background: #111122;
    border: 1px solid rgba(6, 182, 212, 0.3);
    box-shadow: 0 10px 25px rgba(0,0,0,0.6);
    border-radius: 12px;
    padding: 15px;
    min-width: 160px;
    box-sizing: border-box;
    /* Hiệu ứng trượt và ẩn mượt mà */
    opacity: 0;
    pointer-events: none;
    transform: translateY(-15px) scale(0.9);
    transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s ease;
  }
  .info-drawer-panel.open {
    opacity: 1;
    pointer-events: auto;
    transform: translateY(0) scale(1);
  }
  body.light-mode .info-drawer-panel {
    background: #ffffff;
    border: 1px solid rgba(0,0,0,0.12);
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
  }

  .drawer-greeting {
    font-size: 14px;
    font-weight: bold;
    color: #06b6d4;
    margin-bottom: 12px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* Nút Đăng xuất được chuyển vào trong Ngăn kéo thông tin */
  .drawer-logout-btn {
    background: #ef4444;
    color: white;
    width: 100%;
    padding: 8px 0;
    border-radius: 18px;
    font-weight: bold;
    font-size: 12px;
    text-align: center;
    cursor: pointer;
    user-select: none;
    box-shadow: 0 4px 10px rgba(239, 68, 68, 0.25);
    transition: transform 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }
  .drawer-logout-btn:active { transform: scale(0.92); }
</style>

<div id="user-avatar-container">
  <div class="avatar-circle-btn" onclick="toggleUserDrawer(event)" id="avtLetter">U</div>
  <div class="info-drawer-panel" id="userDrawerPanel">
    <div class="drawer-greeting" id="drawerWelcomeTxt">Xin chào!</div>
    <div class="drawer-logout-btn" onclick="userLogout()">Đăng xuất</div>
  </div>
</div>

<div id="user-dashboard">
  <div class="infinite-text-pad" contenteditable="true" placeholder="Gõ văn bản dài vô hạn tại đây..." id="infinitePad"></div>

  <div id="notes-grid"></div>
</div>

<div class="bottom-controls-bar">
  <div id="add-note-btn" onclick="openTypePopup()">+</div>
</div>

<div id="type-popup-mask" onclick="closeTypePopup()">
  <div class="type-popup-box" onclick="event.stopPropagation()">
    <div class="popup-title">Tạo một ghi chú mới</div>
    <div class="type-option-btn type-text-class" onclick="createNewTextNote()">
      <span class="note-icon">📝</span> Tạo ghi chú văn bản mới
    </div>
    <div class="type-option-btn type-future-class" style="opacity: 0.3; cursor: not-allowed;">
      <span class="note-icon">🔒</span> Loại ghi chú khác (Sắp ra mắt)
    </div>
  </div>
</div>

<script>
  // Chặn nổi bọt các thành phần UI
  ['user-dashboard', 'type-popup-mask', 'user-avatar-container'].forEach(id => {
    const el = document.getElementById(id);
    if(el) el.addEventListener('click', (e) => e.stopPropagation());
  });

  // Chặn vùng chạm nền không gian của index.html
  document.addEventListener('pointerdown', (e) => {
    if(e.target.closest('#infinitePad') || e.target.closest('.fullscreen-note-container') || e.target.closest('.bottom-controls-bar') || e.target.closest('.type-popup-box') || e.target.closest('#user-avatar-container')) {
      e.stopPropagation();
    }
  });

  function getUsernameFromCookie() {
    const match = document.cookie.match(new RegExp('(^| )user_session=([^;]+)'));
    return match ? decodeURIComponent(match[2]) : 'guest';
  }

  const currentUser = getUsernameFromCookie();
  let userNotes = JSON.parse(localStorage.getItem(`notes_${currentUser}`)) || [];
  let savedInfiniteText = localStorage.getItem(`inf_text_${currentUser}`) || "";

  const infPad = document.getElementById('infinitePad');
  if(savedInfiniteText) infPad.innerText = savedInfiniteText;

  infPad.addEventListener('input', () => {
    localStorage.setItem(`inf_text_${currentUser}`, infPad.innerText);
  });

  // Khởi tạo thông tin người dùng lên Avatar & Panel trượt
  (function initUserProfile() {
    const welcomeEl = document.getElementById('drawerWelcomeTxt');
    const letterEl = document.getElementById('avtLetter');
    if (currentUser !== 'guest') {
      if(welcomeEl) welcomeEl.textContent = `Xin chào ${currentUser}`;
      if(letterEl) letterEl.textContent = currentUser.charAt(0).toUpperCase();
    }
  })();

  // Hàm bật/tắt Panel ngăn kéo trượt
  window.toggleUserDrawer = function(e) {
    e.stopPropagation();
    const panel = document.getElementById('userDrawerPanel');
    if(panel) panel.classList.toggle('open');
  };

  // Đóng panel khi bấm bất cứ nơi nào ngoài màn hình
  document.addEventListener('click', () => {
    const panel = document.getElementById('userDrawerPanel');
    if(panel) panel.classList.remove('open');
  });

  function renderNotes() {
    const grid = document.getElementById('notes-grid');
    grid.innerHTML = '';
    userNotes.forEach((note, index) => {
      const card = document.createElement('div');
      card.className = 'note-card';
      card.onclick = () => openFullscreenNote(index);
      card.innerHTML = `
        <div class="note-card-title">Ghi chú văn bản mới #${index + 1}</div>
        <div class="note-card-body">${note ? note.replace(/\n/g, '<br>') : 'Trống...'}</div>
      `;
      grid.appendChild(card);
    });
  }

  function openTypePopup() { document.getElementById('type-popup-mask').classList.add('open'); }
  function closeTypePopup() { document.getElementById('type-popup-mask').classList.remove('open'); }

  function createNewTextNote() {
    userNotes.push(""); 
    localStorage.setItem(`notes_${currentUser}`, JSON.stringify(userNotes));
    closeTypePopup();
    renderNotes();
    openFullscreenNote(userNotes.length - 1);
  }

  function openFullscreenNote(index) {
    const fsContainer = document.createElement('div');
    fsContainer.id = 'active-fullscreen-editor';
    fsContainer.className = 'fullscreen-note-container';
    
    fsContainer.addEventListener('pointerdown', (e) => e.stopPropagation());
    fsContainer.addEventListener('click', (e) => e.stopPropagation());

    fsContainer.innerHTML = `
      <div class="fullscreen-header">
        <div class="fullscreen-title">ĐANG CHỈNH SỬA GHI CHÚ #${index + 1}</div>
        <div class="close-edit-btn" onclick="closeFullscreenNote(${index})">Thoát ✕</div>
      </div>
      <textarea class="fullscreen-editor" id="editor-${index}" placeholder="Nhập nội dung... Tự động lưu khi gõ...">${userNotes[index]}</textarea>
    `;
    
    document.body.appendChild(fsContainer);
    
    const textarea = document.getElementById(`editor-${index}`);
    textarea.focus();

    textarea.addEventListener('input', (e) => {
      userNotes[index] = e.target.value;
      localStorage.setItem(`notes_${currentUser}`, JSON.stringify(userNotes));
    });
  }

  window.closeFullscreenNote = function(index) {
    const textarea = document.getElementById(`editor-${index}`);
    if (textarea) {
      userNotes[index] = textarea.value;
      localStorage.setItem(`notes_${currentUser}`, JSON.stringify(userNotes));
    }
    
    const fsContainer = document.getElementById('active-fullscreen-editor');
    if(fsContainer) fsContainer.remove();
    
    renderNotes();
  };

  window.userLogout = function() {
    const transStar = document.getElementById('transition-star');
    if(transStar) {
      transStar.style.opacity = '1';
      transStar.style.transform = 'translate(-50%, -50%) scale(1) rotate(360deg)';
    }

    setTimeout(() => {
      document.body.classList.add('gates-closed');
    }, 400);

    setTimeout(() => {
      document.cookie = "user_session=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;";
      
      // Gỡ vùng chứa avatar khi đăng xuất để dọn giao diện sạch
      const avtContainer = document.getElementById('user-avatar-container');
      if(avtContainer) avtContainer.remove();

      const viewport = document.getElementById('user-app-viewport');
      if(viewport) viewport.remove();

      const loginUI = document.getElementById('main-content-ui');
      if(loginUI) loginUI.style.display = 'block';

      if(transStar) transStar.style.transform = 'translate(-50%, -50%) scale(0) rotate(720deg)';
      setTimeout(() => {
        document.body.classList.remove('gates-closed');
        if(transStar) transStar.style.opacity = '0';
      }, 600);

    }, 1400);
  };

  renderNotes();
  </script>
