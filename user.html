<div id="user-dashboard-wrapper">
  
  <div class="user-header">
    <div class="header-left">
      <span class="welcome-txt">Xin chào, <span id="display-username">Người dùng</span> ✨</span>
    </div>
    <div class="header-right">
      <div class="avatar-box" onclick="toggleProfileMenu(event)">
        <div class="avatar-circle">K</div>
        <div id="profile-dropdown" class="dropdown-content">
          <button onclick="logoutApp()">Đăng xuất 🚪</button>
        </div>
      </div>
    </div>
  </div>

  <div class="user-main-content">
    <div class="grid-container">
      
      <div class="feature-box" onclick="openBoxPopup('popup-notepad')">
        <div class="box-icon">📝</div>
        <h3>Sổ ghi chú</h3>
        <p>Lưu trữ các ý tưởng và kế hoạch cá nhân của bạn.</p>
      </div>

      <div class="feature-box" onclick="openBoxPopup('popup-tools')">
        <div class="box-icon">⚙️</div>
        <h3>Cài đặt ứng dụng</h3>
        <p>Tùy chỉnh cấu hình và quản lý tài khoản.</p>
      </div>

    </div>
  </div>

  <div id="popup-notepad" class="box-popup-overlay" onclick="closeBoxPopup('popup-notepad')">
    <div class="box-popup-content" onclick="event.stopPropagation()">
      <button class="popup-close-btn" onclick="closeBoxPopup('popup-notepad')">✕</button>
      
      <div class="popup-header">
        <h2>Sổ Ghi Chú Không Gian</h2>
      </div>
      
      <div class="popup-body">
        <textarea id="notepad-area" placeholder="Viết gì đó vào đây... Hệ thống sẽ tự động lưu lại."></textarea>
      </div>
    </div>
  </div>

  <div id="popup-tools" class="box-popup-overlay" onclick="closeBoxPopup('popup-tools')">
    <div class="box-popup-content" onclick="event.stopPropagation()">
      <button class="popup-close-btn" onclick="closeBoxPopup('popup-tools')">✕</button>
      <div class="popup-header">
        <h2>Cài Đặt Hệ Thống</h2>
      </div>
      <div class="popup-body">
        <p>Phiên bản ứng dụng: <strong>v1.0 (Cosmic Build)</strong></p>
        <p>Trạng thái hệ thống: <span style="color: #22c55e;">Ổn định mượt mà ●</span></p>
      </div>
    </div>
  </div>

</div>

<style>
  /* ==========================================
     THIẾT LẬP HỆ THỐNG Z-INDEX CHUẨN ĐỂ CHỐNG ĐÈ KHUẤT:
     z-index: 10 (Nền trang / Card) < 20 (Avatar) < 30 (Box khi mở Popup) < 9500 (Cửa sập chuyển cảnh)
     ========================================== */
  
  #user-dashboard-wrapper {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100vh;
    display: flex; flex-direction: column;
    font-family: sans-serif;
    color: #fff;
    z-index: 10; /* Nằm dưới lớp cửa sập */
    box-sizing: border-box;
  }

  /* --- THANH HEADER --- */
  .user-header {
    height: 60px; width: 100%;
    display: flex; justify-content: space-between; align-items: center;
    padding: 0 20px; box-sizing: border-box;
    background: rgba(255, 255, 255, 0.03);
    border-bottom: 1px solid rgba(255, 255, 255, 0.08);
  }
  .welcome-txt { font-size: 16px; font-weight: 500; }

  /* Đã sửa: Đẩy cụm Avatar sang bên phải */
  .header-right {
    display: flex; align-items: center;
  }
  .avatar-box {
    position: relative; cursor: pointer;
    z-index: 20; /* Đảm bảo nổi lên trên các nút nội dung thông thường */
  }
  .avatar-circle {
    width: 38px; height: 38px;
    background: linear-gradient(135deg, #06b6d4, #d946ef);
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    font-weight: bold; color: white; border: 2px solid rgba(255,255,255,0.2);
    transition: transform 0.2s;
  }
  .avatar-circle:active { transform: scale(0.92); }

  /* Menu thả xuống từ Avatar */
  .dropdown-content {
    display: none; position: absolute; right: 0; top: 45px;
    background-color: #151525; min-width: 120px;
    border-radius: 8px; border: 1px solid rgba(255,255,255,0.15);
    box-shadow: 0 8px 20px rgba(0,0,0,0.5); overflow: hidden;
  }
  .dropdown-content.show { display: block; }
  .dropdown-content button {
    width: 100%; padding: 10px 15px; background: none; border: none;
    color: #ff4a4a; text-align: left; font-size: 14px; cursor: pointer; font-weight: bold;
  }
  .dropdown-content button:hover { background-color: rgba(255,255,255,0.08); }

  /* --- VÙNG NỘI DUNG CHÍNH --- */
  .user-main-content {
    flex: 1; overflow-y: auto; padding: 25px; box-sizing: border-box;
  }
  .grid-container {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px;
  }
  .feature-box {
    background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px; padding: 20px; text-align: center; cursor: pointer;
    transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.1), background-color 0.3s;
    -webkit-tap-highlight-color: transparent;
  }
  .feature-box:active { transform: scale(0.96); }
  .box-icon { font-size: 32px; margin-bottom: 8px; }
  .feature-box h3 { margin: 10px 0 5px 0; font-size: 16px; }
  .feature-box p { margin: 0; font-size: 12px; color: rgba(255,255,255,0.5); line-height: 1.4; }

  /* ==========================================
     ĐÃ SỬA LỖI NỀN TRẮNG CHE KHUẤT CÁC BOX TRÊN MÀN HÌNH LIGHT-MODE
     ========================================== */
  body.light-mode #user-dashboard-wrapper { color: #101026 !important; }
  body.light-mode .user-header { border-bottom-color: rgba(0, 0, 0, 0.08); background: rgba(0, 0, 0, 0.02); }
  body.light-mode .feature-box {
    background: rgba(0, 0, 0, 0.03) !important;
    border-color: rgba(0, 0, 0, 0.08) !important;
  }
  body.light-mode .feature-box p { color: rgba(0, 0, 0, 0.5) !important; }
  body.light-mode .box-popup-content {
    background-color: #ffffff !important;
    border-color: rgba(0, 0, 0, 0.15) !important;
    box-shadow: 0 15px 40px rgba(0,0,0,0.15) !important;
  }
  body.light-mode .popup-header h2 { color: #101026 !important; }
  body.light-mode .popup-close-btn { color: #555 !important; background: rgba(0,0,0,0.05) !important; }
  body.light-mode #notepad-area {
    background: rgba(0,0,0,0.03) !important; color: #101026 !important; border-color: rgba(0,0,0,0.1) !important;
  }

  /* --- CẤU TRÚC POPUP (SỬA LỖI LỆCH NÚT THOÁT VÀ QUÁ TRỚN CHIỀU CAO) --- */
  .box-popup-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background-color: rgba(0, 0, 0, 0.6); backdrop-filter: blur(4px);
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none;
    z-index: 30; /* Lớp Popup luôn phải lớn hơn Avatar và nội dung bên dưới */
    transition: opacity 0.4s ease;
    padding: 20px; box-sizing: border-box;
  }
  .box-popup-overlay.open { opacity: 1; pointer-events: auto; }

  .box-popup-content {
    position: relative; /* Cố định gốc tọa độ cho nút thoát bên trong */
    background-color: #141424; border: 1px solid rgba(255, 255, 255, 0.15);
    border-radius: 16px; width: 100%; max-width: 450px;
    max-height: 80vh; /* Giới hạn chiều cao tối đa không vượt quá màn hình */
    display: flex; flex-direction: column;
    box-shadow: 0 15px 40px rgba(0,0,0,0.5);
    transform: scale(0.85); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.15);
    padding: 20px; box-sizing: border-box;
  }
  .box-popup-overlay.open .box-popup-content { transform: scale(1); }

  /* Nút thoát nằm trọn vẹn bên TRONG góc phải của box nội dung, không bao giờ lệch ra ngoài */
  .popup-close-btn {
    position: absolute; top: 15px; right: 15px;
    width: 30px; height: 30px; border-radius: 50%;
    border: none; background: rgba(255,255,255,0.08);
    color: #fff; font-size: 14px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s, transform 0.2s;
  }
  .popup-close-btn:active { transform: scale(0.9); }

  .popup-header { margin-bottom: 15px; padding-right: 35px; }
  .popup-header h2 { margin: 0; font-size: 18px; color: #06b6d4; }
  
  /* Phần thân điều tiết linh hoạt theo flex, ngăn chặn lỗi quá trớn chiều cao phần dưới */
  .popup-body {
    flex: 1; overflow-y: auto; display: flex; flex-direction: column;
  }

  /* Textarea chuyên dụng cho ghi chú */
  #notepad-area {
    width: 100%; flex: 1; min-height: 180px; max-height: 350px;
    resize: none; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px; padding: 12px; color: #fff; font-size: 14px; line-height: 1.5;
    outline: none; box-sizing: border-box; transition: border-color 0.3s;
  }
  #notepad-area:focus { border-color: #06b6d4; }
</style>

<script>
  // --- TỰ ĐỘNG HIỂN THỊ TÊN TÀI KHOẢN TỪ COOKIE ---
  (function initUserDashboard() {
      const getCookie = (name) => {
          const match = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
          return match ? decodeURIComponent(match[2]) : null;
      };
      const activeUser = getCookie('user_session') || "Khách";
      const nameEl = document.getElementById('display-username');
      if(nameEl) nameEl.textContent = activeUser;
      
      const avatarCircle = document.querySelector('.avatar-circle');
      if(avatarCircle && activeUser !== "Khách") {
          avatarCircle.textContent = activeUser.charAt(0).toUpperCase();
      }

      // Tải lại dữ liệu ghi chú cũ từ localStorage nếu có
      const savedNotes = localStorage.getItem(`note_${activeUser}`);
      const notepad = document.getElementById('notepad-area');
      if(notepad && savedNotes) {
          notepad.value = savedNotes;
      }
      
      // Lắng nghe sự kiện gõ phím để tự động lưu ghi chú
      if(notepad) {
          notepad.addEventListener('input', function() {
              localStorage.setItem(`note_${activeUser}`, this.value);
          });
      }
  })();

  // --- LOGIC ĐIỀU KHIỂN POPUP BOX CHỨC NĂNG ---
  function openBoxPopup(id) {
      const pop = document.getElementById(id);
      if(pop) pop.classList.add('open');
  }

  function closeBoxPopup(id) {
      const pop = document.getElementById(id);
      if(pop) pop.classList.remove('open');
  }

  // --- BẬT/TẮT MENU AVATAR ---
  function toggleProfileMenu(e) {
      e.stopPropagation();
      document.getElementById('profile-dropdown').classList.toggle('show');
  }

  // Tự động đóng menu nếu nhấn trượt ra ngoài
  document.addEventListener('click', function() {
      const drop = document.getElementById('profile-dropdown');
      if(drop) drop.classList.remove('show');
  });

  // --- CƠ CHẾ ĐĂNG XUẤT AN TOÀN - ĐỒNG BỘ CỬA SẬP VŨ TRỤ ---
  function logoutApp() {
      // Xóa cookie phiên đăng nhập
      document.cookie = "user_session=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;";
      
      // Kích hoạt dải cửa sập đóng lại trước khi dọn dẹp viewport
      document.body.classList.add('gates-closed');
      
      setTimeout(() => {
          // Gỡ bỏ hoàn toàn viewport của user.html ra khỏi bộ nhớ
          const userViewport = document.getElementById('user-app-viewport');
          if(userViewport) userViewport.remove();
          
          // Trả lại giao diện chính cho trang index.html
          const mainUI = document.getElementById('main-content-ui');
          if(mainUI) mainUI.style.display = 'block';
          
          // Mở dải cửa sập ra mượt mà, đưa người dùng về lại màn hình đăng nhập ban đầu
          setTimeout(() => {
              document.body.classList.remove('gates-closed');
          }, 400);
      }, 1100);
  }
</style>
